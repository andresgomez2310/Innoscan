version: '3.9'

services:

  backend:
    build: ./backend

    container_name: innoscan-backend

    ports:
      - "3001:3001"

    env_file:
      - ./backend/.env

  frontend:
    build: ./frontend

    container_name: innoscan-frontend

    ports:
      - "3000:3000"

    env_file:
      - ./frontend/.env.local

    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001

    depends_on:
      - backend