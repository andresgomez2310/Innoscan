version: '3.9'

services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: innoscan-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - innoscan-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  ollama:
    image: ollama/ollama:latest
    container_name: innoscan-ollama
    volumes:
      - ./ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    networks:
      - innoscan-network

  api-gateway:
    build: ./api-gateway
    container_name: innoscan-api-gateway
    ports:
      - "3001:3001"
    env_file:
      - .env
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - innoscan-network

  recommendation-service:
    build: ./services/recommendation-services
    container_name: innoscan-recommendation-service
    env_file:
      - .env
    environment:
      # URL interna para que el microservicio hable con la IA local
      - OLLAMA_URL=http://innoscan-ollama:11434
    depends_on:
      rabbitmq:
        condition: service_healthy
      ollama:
        condition: service_started
    networks:
      - innoscan-network

  catalog-service:
    build: ./services/catalog-service
    container_name: innoscan-catalog-service
    env_file:
      - .env
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - innoscan-network

  feedback-service:
    build: ./services/feedback-service
    container_name: innoscan-feedback-service
    env_file:
      - .env
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - innoscan-network

  frontend:
    build: ./frontend
    container_name: innoscan-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:3001
    depends_on:
      - api-gateway
    networks:
      - innoscan-network

networks:
  innoscan-network:
    driver: bridge